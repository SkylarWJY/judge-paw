<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Judge Paw ⚖️🐾 — The AI Relationship Court</title>
<style>
  :root{ --ink:#3a1f33; --muted:#9a7088; --pink:#ff4d9d; --pink-soft:#ffe0ef;
    --gold:#e8a83b; --card:#fff; --line:#fbdcec; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{ min-height:100vh; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    background:linear-gradient(150deg,#fff5fa 0%,#ffe7f3 55%,#ffd9ec 100%);
    display:flex; justify-content:center; padding:40px 18px; }
  .wrap{ width:100%; max-width:680px }
  header{ text-align:center; margin-bottom:28px }
  .gavel{ font-size:54px }
  h1{ font-size:40px; letter-spacing:-.02em; margin-top:4px }
  .tag{ color:var(--muted); font-size:17px; margin-top:6px }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:24px; box-shadow:0 12px 34px rgba(180,80,140,.12); }
  label{ display:block; font-weight:700; font-size:14px; margin:14px 0 6px; color:var(--pink) }
  input,textarea{ width:100%; border:1.5px solid var(--line); border-radius:12px;
    padding:12px 14px; font:inherit; font-size:15px; resize:vertical; background:#fffafd }
  input:focus,textarea:focus{ outline:none; border-color:var(--pink) }
  .two{ display:flex; gap:14px }
  .two>div{ flex:1 }
  button{ width:100%; margin-top:20px; border:none; border-radius:14px; cursor:pointer;
    background:var(--pink); color:#fff; font-weight:800; font-size:18px; padding:15px;
    box-shadow:0 8px 20px rgba(255,77,157,.35) }
  button:disabled{ opacity:.6; cursor:wait }
  .verdict{ margin-top:22px; display:none }
  .verdict.show{ display:block; animation:rise .4s ease }
  @keyframes rise{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  .vc{ background:var(--ink); color:#fff; border-radius:18px; padding:24px; }
  .vc h2{ font-size:22px; margin-bottom:14px }
  .vc .row{ margin:14px 0 }
  .vc .k{ font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); font-weight:800 }
  .vc .v{ font-size:17px; line-height:1.45; margin-top:4px }
  .err{ color:#b32a73; font-weight:700; margin-top:14px; text-align:center; min-height:20px }
  .reset{ background:none; color:var(--muted); box-shadow:none; font-size:15px; margin-top:10px }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="gavel">⚖️🐾</div>
    <h1>Judge Paw</h1>
    <div class="tag">The first AI relationship court. State your case.</div>
  </header>

  <div class="card" id="form">
    <label>What's the fight about?</label>
    <input id="topic" placeholder="e.g. who does the dishes">
    <div class="two">
      <div>
        <label>Partner A — their side</label>
        <textarea id="aStmt" rows="4" placeholder="I was just relaxing after a long week…"></textarea>
      </div>
      <div>
        <label>Partner B — their side</label>
        <textarea id="bStmt" rows="4" placeholder="I did everything around the house, alone…"></textarea>
      </div>
    </div>
    <button id="go">Render Verdict 🐾</button>
    <div class="err" id="err"></div>
  </div>

  <div class="verdict" id="verdict">
    <div class="vc" id="vc"></div>
    <button class="reset" id="reset">⟲ New Case</button>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const go = $("go"), err = $("err"), verdict = $("verdict"), vc = $("vc"), form = $("form");

  go.onclick = async () => {
    const topic = $("topic").value.trim();
    const a = $("aStmt").value.trim();
    const b = $("bStmt").value.trim();
    err.textContent = "";
    if (!a || !b) { err.textContent = "Both partners need to state their side."; return; }

    go.disabled = true; go.textContent = "Judge Paw is deliberating… 🐾";
    try {
      const res = await fetch("/api/verdict", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ topic, partnerA:{name:"Partner A",statement:a}, partnerB:{name:"Partner B",statement:b} }),
      });
      const v = await res.json();
      if (!res.ok) throw new Error(v.error || "Something went wrong.");
      render(v);
    } catch (e) {
      err.textContent = e.message;
    } finally {
      go.disabled = false; go.textContent = "Render Verdict 🐾";
    }
  };

  function render(v){
    if (v.safety === "declined"){
      vc.innerHTML = `<h2>🐾 Judge Paw steps down</h2><div class="row"><div class="v">${esc(v.message)}</div></div>`;
    } else {
      vc.innerHTML = `
        <h2>⚖️ The Verdict</h2>
        <div class="row"><div class="k">Ruling</div><div class="v">${esc(v.ruling)}</div></div>
        <div class="row"><div class="k">Reasoning</div><div class="v">${esc(v.reasoning)}</div></div>
        <div class="row"><div class="k">Sentence</div><div class="v">${esc(v.sentence)}</div></div>`;
    }
    form.style.display = "none";
    verdict.classList.add("show");
  }

  $("reset").onclick = () => {
    verdict.classList.remove("show"); form.style.display = "block";
    $("topic").value = $("aStmt").value = $("bStmt").value = ""; err.textContent = "";
  };

  function esc(s){ return (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
</script>
</body>
</html>
